<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Dashboard — Resize & Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 20 20" width="20" height="20" fill="none">
          <rect x="2" y="2" width="7" height="7" rx="1.5" fill="white"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.4"/>
        </svg>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-icon active" title="Dashboard">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="nav-icon" title="Charts">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
            <path d="M3 15L7 9L11 12L15 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="17" x2="17" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="nav-icon" title="Reports">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
            <rect x="4" y="2" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="7" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="7" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="7" y1="13" x2="11" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="nav-icon" title="Settings">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
            <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 3v1.5M10 15.5V17M3 10h1.5M15.5 10H17M4.93 4.93l1.06 1.06M13.01 13.01l1.06 1.06M15.07 4.93l-1.06 1.06M6.99 13.01l-1.06 1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="content">
      <header class="page-header">
        <h1 class="page-title">Dashboard</h1>
        <button class="btn-share">Share</button>
      </header>
      <div class="grid" id="grid"></div>
    </main>
  </div>

  <!-- Context menu -->
  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" data-action="info">More info</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-action="small">Make is small</div>
    <div class="ctx-item" data-action="big">Make is big</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-action="duplicate">Duplicate</div>
    <div class="ctx-item" data-action="rename">Rename</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" data-action="remove">Remove</div>
  </div>

  <!-- Drag ghost -->
  <div class="drag-ghost" id="dragGhost"></div>

  <script src="app.js"></script>
</body>
</html>
